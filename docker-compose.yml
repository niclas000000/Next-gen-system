version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports:
      - '5432:5432'
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data

volumes:
  nexus_postgres_data:
